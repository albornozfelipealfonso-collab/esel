<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planilla — Tu hoja de cálculo</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0f0f11;--bg2:#18181c;--bg3:#22222a;--bg4:#2a2a34;
  --border:#333340;--border2:#44445a;
  --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a70;
  --accent:#7c6af7;--accent2:#5a4ed4;--accent3:#a89af9;
  --green:#3ecf8e;--amber:#f5a623;--red:#f25f5c;--blue:#4da6ff;
  --cell-h:26px;--col-w:100px;--row-head-w:48px;
  --font-ui:'Sora',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --radius:6px;--radius-lg:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOP BAR ── */
#topbar{display:flex;align-items:center;gap:0;padding:0;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
#logo{padding:0 18px;font-weight:600;font-size:15px;color:var(--accent3);letter-spacing:-0.3px;border-right:1px solid var(--border);height:42px;display:flex;align-items:center;gap:6px;white-space:nowrap}
#logo span{color:var(--text3);font-weight:400}
#menubar{display:flex;align-items:center;gap:0;height:42px;flex:1;overflow-x:auto}
.menu-group{display:flex;align-items:center;gap:2px;padding:0 10px;border-right:1px solid var(--border);height:100%}
.menu-group:last-child{border-right:none}
.tb-btn{display:flex;align-items:center;gap:5px;padding:5px 9px;border:none;background:transparent;color:var(--text2);font-family:var(--font-ui);font-size:12px;cursor:pointer;border-radius:var(--radius);white-space:nowrap;transition:all .15s}
.tb-btn:hover{background:var(--bg3);color:var(--text)}
.tb-btn.active{background:var(--bg4);color:var(--accent3)}
.tb-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.tb-btn.danger:hover{color:var(--red)}
select.tb-sel{padding:5px 8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:var(--font-ui);font-size:12px;cursor:pointer;border-radius:var(--radius);outline:none}
select.tb-sel:hover{border-color:var(--border2);color:var(--text)}
.sep{width:1px;height:20px;background:var(--border);margin:0 4px}

/* ── FORMULA BAR ── */
#formulabar{display:flex;align-items:center;gap:0;padding:0;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;height:34px}
#cell-ref-box{width:72px;padding:0 10px;font-family:var(--font-mono);font-size:12px;background:var(--bg3);border-right:1px solid var(--border);height:100%;display:flex;align-items:center;color:var(--accent3);font-weight:500;flex-shrink:0}
#fx-label{padding:0 10px;color:var(--text3);font-family:var(--font-mono);font-size:13px;border-right:1px solid var(--border);height:100%;display:flex;align-items:center;flex-shrink:0}
#formula-input{flex:1;height:100%;border:none;outline:none;background:transparent;color:var(--text);font-family:var(--font-mono);font-size:12px;padding:0 12px;caret-color:var(--accent3)}
#formula-input::placeholder{color:var(--text3)}
#status-right{padding:0 16px;font-size:11px;color:var(--text3);display:flex;gap:16px;align-items:center;flex-shrink:0}
.stat{display:flex;gap:5px}
.stat-label{color:var(--text3)}
.stat-val{color:var(--text2);font-family:var(--font-mono)}

/* ── MAIN AREA ── */
#workspace{display:flex;flex:1;overflow:hidden}
#sheet-wrap{flex:1;overflow:auto;position:relative}
#sheet-wrap::-webkit-scrollbar{width:8px;height:8px}
#sheet-wrap::-webkit-scrollbar-track{background:var(--bg)}
#sheet-wrap::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
#sheet-wrap::-webkit-scrollbar-thumb:hover{background:var(--border2)}

/* ── GRID ── */
table{border-collapse:collapse;table-layout:fixed}
.col-head{position:sticky;top:0;z-index:10;background:var(--bg2);border:none;border-bottom:1px solid var(--border);border-right:1px solid var(--border);color:var(--text3);font-size:11px;font-weight:500;font-family:var(--font-ui);text-align:center;width:var(--col-w);min-width:var(--col-w);height:28px;padding:0;user-select:none;cursor:pointer;transition:background .1s}
.col-head:hover{background:var(--bg3);color:var(--text2)}
.col-head.selected-col{background:var(--bg4);color:var(--accent3)}
.corner-head{position:sticky;top:0;left:0;z-index:11;background:var(--bg2);border:none;border-bottom:1px solid var(--border);border-right:1px solid var(--border);width:var(--row-head-w);min-width:var(--row-head-w)}
.row-head{position:sticky;left:0;z-index:5;background:var(--bg2);border:none;border-bottom:1px solid var(--border);border-right:1px solid var(--border);color:var(--text3);font-size:11px;font-weight:500;font-family:var(--font-mono);text-align:right;padding:0 8px;width:var(--row-head-w);min-width:var(--row-head-w);height:var(--cell-h);user-select:none;cursor:pointer;transition:background .1s}
.row-head:hover{background:var(--bg3);color:var(--text2)}
.row-head.selected-row{background:var(--bg4);color:var(--accent3)}
td.cell{border:none;border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:0;height:var(--cell-h);width:var(--col-w);min-width:var(--col-w);position:relative;overflow:hidden;background:var(--bg)}
td.cell:hover:not(.editing){background:var(--bg2)}
td.cell.in-range{background:rgba(124,106,247,0.07)}
td.cell.selected{background:rgba(124,106,247,0.12);outline:1.5px solid var(--accent);outline-offset:-1px}
td.cell.editing{background:var(--bg2);outline:2px solid var(--accent3);outline-offset:-1px;z-index:20}
td.cell.has-bold .cv{font-weight:600}
td.cell.has-italic .cv{font-style:italic}
td.cell.align-right .cv{text-align:right}
td.cell.align-center .cv{text-align:center}
td.cell.c-green{color:var(--green)}
td.cell.c-amber{color:var(--amber)}
td.cell.c-red{color:var(--red)}
td.cell.c-blue{color:var(--blue)}
.cv{display:block;width:100%;height:100%;padding:0 5px;font-size:12px;line-height:var(--cell-h);overflow:hidden;white-space:nowrap;font-family:var(--font-mono);color:inherit;cursor:cell}
.cv.num{text-align:right}
.cv.err{color:var(--red);font-size:11px}
input.cell-input{width:100%;height:100%;border:none;outline:none;background:transparent;color:var(--text);font-family:var(--font-mono);font-size:12px;padding:0 5px}
.hidden-row td{display:none}
.hidden-row .row-head{display:table-cell}

/* ── SIDE PANEL ── */
#sidepanel{width:280px;border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0;transition:width .2s}
#sidepanel.collapsed{width:0;overflow:hidden}
#panel-header{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.ptab{flex:1;padding:10px 0;font-size:11px;text-align:center;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;font-weight:500;letter-spacing:.3px}
.ptab:hover{color:var(--text2)}
.ptab.active{color:var(--accent3);border-bottom-color:var(--accent)}
#panel-body{flex:1;overflow-y:auto;padding:14px}
#panel-body::-webkit-scrollbar{width:5px}
#panel-body::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
.panel-section{margin-bottom:18px}
.panel-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px;font-weight:600}
.panel-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.panel-row label{font-size:11px;color:var(--text2);flex:1}
.panel-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font-ui);font-size:12px;padding:5px 8px;border-radius:var(--radius);outline:none;width:100%}
.panel-input:focus{border-color:var(--accent)}
.panel-btn{width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:var(--font-ui);font-size:12px;cursor:pointer;border-radius:var(--radius);transition:all .15s;margin-bottom:4px}
.panel-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.panel-btn.primary{background:rgba(124,106,247,0.15);border-color:rgba(124,106,247,0.4);color:var(--accent3)}
.panel-btn.primary:hover{background:rgba(124,106,247,0.25)}
.chart-wrap{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--bg);padding:10px;margin-bottom:12px}

/* ── PIVOT ── */
.pivot-table{width:100%;font-size:11px;border-collapse:collapse}
.pivot-table th{text-align:left;padding:6px 8px;color:var(--text3);border-bottom:1px solid var(--border);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.pivot-table td{padding:6px 8px;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:11px}
.pivot-table tr:last-child td{border-bottom:none;color:var(--accent3);font-weight:600}
.pivot-bar{height:3px;border-radius:2px;background:var(--accent);margin-top:3px;transition:width .3s}

/* ── FILTER ── */
.filter-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.filter-item:last-child{border-bottom:none}
.filter-item label{font-size:12px;color:var(--text2);flex:1;cursor:pointer}
input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;cursor:pointer}
.filter-col-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font-ui);font-size:12px;padding:6px 8px;border-radius:var(--radius);outline:none;width:100%;margin-bottom:10px}
.filter-col-sel:focus{border-color:var(--accent)}
.filter-search{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:12px;padding:6px 8px;border-radius:var(--radius);outline:none;margin-bottom:8px}
.filter-search:focus{border-color:var(--accent)}

/* ── TABS ── */
#tabsbar{display:flex;align-items:center;gap:4px;padding:5px 10px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;overflow-x:auto}
#tabsbar::-webkit-scrollbar{height:3px}
#tabsbar::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.sheet-tab{padding:4px 14px;font-size:11px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;background:transparent;color:var(--text3);white-space:nowrap;transition:all .15s;font-family:var(--font-ui)}
.sheet-tab:hover{background:var(--bg3);color:var(--text2);border-color:var(--border2)}
.sheet-tab.active{background:rgba(124,106,247,0.15);color:var(--accent3);border-color:rgba(124,106,247,0.4)}
.sheet-tab-add{padding:4px 10px;font-size:13px;border:1px dashed var(--border);border-radius:var(--radius);cursor:pointer;background:transparent;color:var(--text3);transition:all .15s}
.sheet-tab-add:hover{border-color:var(--accent);color:var(--accent)}

/* ── CONTEXT MENU ── */
#ctxmenu{position:fixed;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:6px;z-index:1000;display:none;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.ctx-item{padding:7px 12px;font-size:12px;cursor:pointer;border-radius:var(--radius);color:var(--text2);display:flex;align-items:center;gap:8px;transition:background .1s}
.ctx-item:hover{background:var(--bg4);color:var(--text)}
.ctx-item.danger:hover{color:var(--red)}
.ctx-sep{height:1px;background:var(--border);margin:4px 0}

/* ── TOAST ── */
#toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:8px 18px;border-radius:var(--radius-lg);font-size:12px;opacity:0;transition:all .3s;pointer-events:none;z-index:2000}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MODAL ── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:center;justify-content:center}
#modal-overlay.show{display:flex}
#modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px;width:380px;max-width:90vw}
#modal h3{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--text)}
.modal-row{margin-bottom:12px}
.modal-row label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.modal-row input,.modal-row select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font-ui);font-size:13px;padding:8px 10px;border-radius:var(--radius);outline:none}
.modal-row input:focus,.modal-row select:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.modal-actions button{padding:8px 18px;border-radius:var(--radius);font-family:var(--font-ui);font-size:13px;cursor:pointer;border:1px solid var(--border)}
.modal-actions .btn-cancel{background:transparent;color:var(--text2)}
.modal-actions .btn-cancel:hover{background:var(--bg3)}
.modal-actions .btn-ok{background:rgba(124,106,247,0.2);border-color:rgba(124,106,247,0.5);color:var(--accent3)}
.modal-actions .btn-ok:hover{background:rgba(124,106,247,0.3)}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a89af9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
    Planilla <span>beta</span>
  </div>
  <div id="menubar">
    <div class="menu-group">
      <button class="tb-btn" onclick="newFile()" title="Nuevo">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Nuevo
      </button>
      <button class="tb-btn" onclick="exportXLSX()" title="Exportar XLSX">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>XLSX
      </button>
      <button class="tb-btn" onclick="exportCSV()" title="Exportar CSV">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>CSV
      </button>
      <label class="tb-btn" title="Importar CSV/XLSX">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Importar
        <input type="file" accept=".csv,.xlsx,.xls" style="display:none" onchange="importFile(event)">
      </label>
    </div>
    <div class="menu-group">
      <button class="tb-btn" id="btn-bold" onclick="toggleFormat('bold')" title="Negrita">
        <svg viewBox="0 0 24 24"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg>
      </button>
      <button class="tb-btn" id="btn-italic" onclick="toggleFormat('italic')" title="Cursiva">
        <svg viewBox="0 0 24 24"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
      </button>
      <div class="sep"></div>
      <button class="tb-btn" onclick="toggleFormat('align-left')" title="Izquierda">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
      </button>
      <button class="tb-btn" onclick="toggleFormat('align-center')" title="Centro">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      </button>
      <button class="tb-btn" onclick="toggleFormat('align-right')" title="Derecha">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="6" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
    <div class="menu-group">
      <select class="tb-sel" id="color-sel" onchange="applyColor(this.value)" title="Color de texto">
        <option value="">Color</option>
        <option value="c-green">🟢 Verde</option>
        <option value="c-amber">🟡 Ámbar</option>
        <option value="c-red">🔴 Rojo</option>
        <option value="c-blue">🔵 Azul</option>
        <option value="">⚪ Quitar</option>
      </select>
      <select class="tb-sel" id="fn-sel" onchange="insertFn(this.value)">
        <option value="">ƒ Función…</option>
        <optgroup label="Matemáticas">
          <option value="=SUM(">=SUM(</option>
          <option value="=AVERAGE(">=AVERAGE(</option>
          <option value="=MAX(">=MAX(</option>
          <option value="=MIN(">=MIN(</option>
          <option value="=COUNT(">=COUNT(</option>
          <option value="=ROUND(">=ROUND(</option>
          <option value="=ABS(">=ABS(</option>
          <option value="=SQRT(">=SQRT(</option>
          <option value="=POWER(">=POWER(</option>
          <option value="=MOD(">=MOD(</option>
        </optgroup>
        <optgroup label="Lógicas">
          <option value="=IF(">=IF(</option>
          <option value="=AND(">=AND(</option>
          <option value="=OR(">=OR(</option>
          <option value="=NOT(">=NOT(</option>
          <option value="=ISNUMBER(">=ISNUMBER(</option>
          <option value="=ISBLANK(">=ISBLANK(</option>
        </optgroup>
        <optgroup label="Texto">
          <option value="=CONCATENATE(">=CONCATENATE(</option>
          <option value="=LEFT(">=LEFT(</option>
          <option value="=RIGHT(">=RIGHT(</option>
          <option value="=LEN(">=LEN(</option>
          <option value="=UPPER(">=UPPER(</option>
          <option value="=LOWER(">=LOWER(</option>
          <option value="=TRIM(">=TRIM(</option>
        </optgroup>
        <optgroup label="Búsqueda">
          <option value="=VLOOKUP(">=VLOOKUP(</option>
          <option value="=HLOOKUP(">=HLOOKUP(</option>
          <option value="=MATCH(">=MATCH(</option>
          <option value="=INDEX(">=INDEX(</option>
        </optgroup>
      </select>
    </div>
    <div class="menu-group">
      <button class="tb-btn" onclick="insertRow()" title="Insertar fila">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="7" rx="1"/><rect x="3" y="14" width="18" height="7" rx="1"/><line x1="12" y1="10.5" x2="12" y2="13.5"/></svg>+Fila
      </button>
      <button class="tb-btn" onclick="insertCol()" title="Insertar columna">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/><line x1="10.5" y1="12" x2="13.5" y2="12"/></svg>+Col
      </button>
      <button class="tb-btn danger" onclick="deleteRowCmd()" title="Eliminar fila">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
    </div>
    <div class="menu-group">
      <button class="tb-btn" onclick="openFilterPanel()" title="Filtros">
        <svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>Filtrar
      </button>
      <button class="tb-btn" onclick="openPivotPanel()" title="Tabla dinámica">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>Pivot

<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const ROWS=30,COLS=16;
let sheets={};
let sheetNames=['Hoja 1'];
let currentSheet='Hoja 1';
let selCell='A1';
let selStart=null,selEnd=null;
let isEditing=false;
let chartInst=null;
let filterState={};
let clipboard=null;
let modalCallback=null;

function getSheet(){return sheets[currentSheet]||initSheet(currentSheet);}
function initSheet(name){sheets[name]={data:{},styles:{},hidden:{}};return sheets[name];}
function SD(){return getSheet().data;}
function SS(){return getSheet().styles;}
function SH(){return getSheet().hidden;}

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function colName(i){let s='';while(i>0){s=String.fromCharCode(64+(i%26||26))+s;i=Math.floor((i-1)/26);}return s;}
function colIndex(s){let c=0;for(let ch of s)c=c*26+ch.charCodeAt(0)-64;return c;}
function cellId(r,c){return colName(c)+r;}
function parseRef(id){const m=String(id).match(/^\$?([A-Z]+)\$?(\d+)$/);if(!m)return null;return{row:parseInt(m[2]),col:colIndex(m[1])};}
function expandRange(s,e){const a=parseRef(s),b=parseRef(e);if(!a||!b)return[];const cells=[];for(let r=Math.min(a.row,b.row);r<=Math.max(a.row,b.row);r++)for(let c=Math.min(a.col,b.col);c<=Math.max(a.col,b.col);c++)cells.push(cellId(r,c));return cells;}
function numFmt(v){if(v===''||v===null||v===undefined)return '';const n=Number(v);if(isNaN(n))return v;return n%1===0?n.toLocaleString('es-CL'):n.toLocaleString('es-CL',{minimumFractionDigits:0,maximumFractionDigits:4});}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// ══════════════════════════════════════════
//  FORMULA ENGINE
// ══════════════════════════════════════════
function getCellVal(id,visited=new Set()){
  const d=SD();const v=d[id];
  if(v===undefined||v==='')return '';
  if(typeof v==='string'&&v.startsWith('=')){
    if(visited.has(id))return '#CIRC!';
    return evalFormula(v,new Set([...visited,id]));
  }
  return v;
}

// ── FORMULA ENGINE ──────────────────────────────────────────────────

// Split top-level comma-separated args (respects nested parens & quotes)
function splitArgs(s){
  const parts=[];let cur='';let d=0;let inQ=false;
  for(let i=0;i<s.length;i++){
    const ch=s[i];
    if(ch==='"'&&s[i-1]!=='\\'){inQ=!inQ;cur+=ch;continue;}
    if(inQ){cur+=ch;continue;}
    if(ch==='('){d++;cur+=ch;}
    else if(ch===')'){d--;cur+=ch;}
    else if(ch===','&&d===0){parts.push(cur.trim());cur='';}
    else cur+=ch;
  }
  if(cur.trim()!==''||parts.length>0)parts.push(cur.trim());
  return parts;
}

// Find matching close paren for open paren at position `open`
function findClose(s,open){
  let d=1;
  for(let i=open+1;i<s.length;i++){
    if(s[i]==='(')d++;
    else if(s[i]===')')d--;
    if(d===0)return i;
  }
  return s.length-1;
}

// Evaluate a single function call given its name and raw arg string
function callFn(fn,rawArgs,visited){
  // 1. Expand range refs A1:B3 -> list of values
  const expanded=rawArgs.replace(/\b([A-Z]+\d+):([A-Z]+\d+)\b/g,(m,s,e)=>{
    return expandRange(s,e).map(id=>{
      const v=getCellVal(id,visited);
      return (v===''||v===null||v===undefined)?'0':v;
    }).join(',');
  });
  // 2. Replace cell refs with their values
  const resolved=expanded.replace(/\b([A-Z]+\d+)\b/g,(m,id)=>{
    const v=getCellVal(id,visited);
    if(v===''||v===null||v===undefined)return '0';
    if(!isNaN(v)&&v!==true&&v!==false)return Number(v);
    return JSON.stringify(String(v));
  });
  // 3. Split args at top level
  const parts=splitArgs(resolved);
  const toNum=(x)=>{const n=Number(x);return isNaN(n)?0:n;};
  const nums=parts.map(toNum).filter((_,i)=>!isNaN(Number(parts[i])));
  const evalExpr=(x)=>{try{return eval(x);}catch{return x;}};

  try{
    switch(fn){
      case 'SUM':    return parts.reduce((s,x)=>s+toNum(x),0);
      case 'AVERAGE':{const ns=parts.map(toNum);return ns.length?ns.reduce((a,b)=>a+b,0)/ns.length:0;}
      case 'MAX':    return Math.max(...parts.map(toNum));
      case 'MIN':    return Math.min(...parts.map(toNum));
      case 'COUNT':  return parts.filter(x=>x!==''&&!isNaN(Number(x))).length;
      case 'COUNTA': return parts.filter(x=>x!==''&&x!=='""'&&x!=='0'||x==='0').length;
      case 'ROUND':{
        let v;try{v=eval(parts[0]);}catch{v=Number(parts[0]);}
        const dec=Number(parts[1]||0);
        const f=Math.pow(10,dec);
        return Math.round(Number(v)*f)/f;
      }
      case 'ROUNDUP':{let v;try{v=eval(parts[0]);}catch{v=Number(parts[0]);}const f=Math.pow(10,Number(parts[1]||0));return Math.ceil(Number(v)*f)/f;}
      case 'ROUNDDOWN':{let v;try{v=eval(parts[0]);}catch{v=Number(parts[0]);}const f=Math.pow(10,Number(parts[1]||0));return Math.floor(Number(v)*f)/f;}
      case 'ABS':    return Math.abs(evalExpr(parts[0]));
      case 'SQRT':   return Math.sqrt(evalExpr(parts[0]));
      case 'POWER':  return Math.pow(evalExpr(parts[0]),evalExpr(parts[1]));
      case 'MOD':    return Number(parts[0])%Number(parts[1]);
      case 'INT':    return Math.floor(evalExpr(parts[0]));
      case 'LOG':    return Math.log(evalExpr(parts[0]))/Math.log(evalExpr(parts[1]||'10'));
      case 'LN':     return Math.log(evalExpr(parts[0]));
      case 'EXP':    return Math.exp(evalExpr(parts[0]));
      case 'PI':     return Math.PI;
      case 'LEN':    return String(parts[0]).replace(/^"|"$/g,'').length;
      case 'LEFT':{const s=String(parts[0]).replace(/^"|"$/g,'');return s.slice(0,toNum(parts[1]||'1'));}
      case 'RIGHT':{const s=String(parts[0]).replace(/^"|"$/g,'');return s.slice(-toNum(parts[1]||'1'));}
      case 'MID':{const s=String(parts[0]).replace(/^"|"$/g,'');return s.slice(toNum(parts[1])-1,toNum(parts[1])-1+toNum(parts[2]));}
      case 'UPPER':  return String(parts[0]).replace(/^"|"$/g,'').toUpperCase();
      case 'LOWER':  return String(parts[0]).replace(/^"|"$/g,'').toLowerCase();
      case 'TRIM':   return String(parts[0]).replace(/^"|"$/g,'').trim();
      case 'SUBSTITUTE':{const s=String(parts[0]).replace(/^"|"$/g,'');const old=String(parts[1]).replace(/^"|"$/g,'');const nw=String(parts[2]).replace(/^"|"$/g,'');return s.split(old).join(nw);}
      case 'CONCATENATE':
      case 'CONCAT': return parts.map(x=>String(x).replace(/^"|"$/g,'')).join('');
      case 'TEXT':   return String(evalExpr(parts[0]));
      case 'VALUE':  return Number(String(parts[0]).replace(/^"|"$/g,'').replace(/[^0-9.\-]/g,''));
      case 'ISNUMBER':return !isNaN(Number(parts[0]))&&parts[0]!==''&&parts[0]!=='""';
      case 'ISBLANK': return parts[0]===''||parts[0]==='""'||parts[0]==='0'&&false;
      case 'ISTEXT':  return isNaN(Number(parts[0]))||parts[0]==='';
      case 'ISERROR': return String(parts[0]).includes('!');
      case 'NOT':     return !evalExpr(parts[0]);
      case 'AND':     return parts.every(x=>{try{return !!eval(x);}catch{return !!x;}});
      case 'OR':      return parts.some(x=>{try{return !!eval(x);}catch{return !!x;}});
      case 'IF':{
        let cond;try{cond=eval(parts[0]);}catch{cond=!!parts[0]&&parts[0]!=='0'&&parts[0]!=='';}
        const tv=String(parts[1]||'').replace(/^"|"$/g,'');
        const fv=String(parts[2]||'').replace(/^"|"$/g,'');
        return cond?tv:fv;
      }
      case 'IFS':{
        for(let i=0;i+1<parts.length;i+=2){
          let c;try{c=eval(parts[i]);}catch{c=!!parts[i];}
          if(c)return String(parts[i+1]||'').replace(/^"|"$/g,'');
        }
        return '#N/A';
      }
      case 'SWITCH':{
        const expr=evalExpr(parts[0]);
        for(let i=1;i+1<parts.length;i+=2){
          if(String(evalExpr(parts[i]))===String(expr))return String(parts[i+1]).replace(/^"|"$/g,'');
        }
        return parts.length%2===0?String(parts[parts.length-1]).replace(/^"|"$/g,''):'#N/A';
      }
      case 'MATCH':{
        const key=String(evalExpr(parts[0])).replace(/^"|"$/g,'').trim();
        const haystack=parts.slice(1,parts.length>2?parts.length-1:parts.length);
        for(let i=0;i<haystack.length;i++){
          if(String(haystack[i]).replace(/^"|"$/g,'').trim()===key)return i+1;
          if(!isNaN(key)&&Number(haystack[i])===Number(key))return i+1;
        }
        return '#N/A';
      }
      case 'INDEX':{
        const rowNum=Number(parts[parts.length-1]);
        if(isNaN(rowNum)||rowNum<1)return '#VALUE!';
        return String(parts[rowNum-1]||'#REF!').replace(/^"|"$/g,'');
      }
      case 'VLOOKUP':{
        const key=String(evalExpr(parts[0])).replace(/^"|"$/g,'').trim();
        const colIdx=Number(parts[parts.length-2]);
        const d=SD();
        for(let r=1;r<=ROWS+20;r++){
          const cv=String(getCellVal(cellId(r,1),visited)||'').trim();
          if(cv===key||((!isNaN(key))&&Number(cv)===Number(key))){
            return getCellVal(cellId(r,colIdx),visited)??'#N/A';
          }
        }
        return '#N/A';
      }
      case 'HLOOKUP': return '#N/A';
      case 'LARGE':{const sorted=parts.slice(0,-1).map(toNum).sort((a,b)=>b-a);return sorted[toNum(parts[parts.length-1])-1]??'#N/A';}
      case 'SMALL':{const sorted=parts.slice(0,-1).map(toNum).sort((a,b)=>a-b);return sorted[toNum(parts[parts.length-1])-1]??'#N/A';}
      case 'RANK':{
        const v=toNum(parts[0]);
        const vals=parts.slice(1).map(toNum).sort((a,b)=>b-a);
        return vals.indexOf(v)+1||'#N/A';
      }
      default: return `#NAME?`;
    }
  }catch(e){return '#ERR!';}
}

// Main formula evaluator: processes formula string bottom-up (innermost parens first)
function evalFormula(formula,visited){
  if(!formula||!formula.startsWith('='))return formula;
  let expr=formula.slice(1).trim();

  // Iteratively resolve function calls, innermost first.
  // We find the LAST opening paren of a known function, which guarantees
  // its argument list has no nested function calls (only arithmetic parens).
  let safety=0;
  while(safety++<200){
    // Find rightmost fn( so its args are free of other fn() calls
    const fnRe=/\b([A-Z][A-Z0-9]*)\(/g;
    let lastMatch=null,m;
    while((m=fnRe.exec(expr))!==null)lastMatch=m;
    if(!lastMatch)break;
    const fn=lastMatch[1];
    const openIdx=lastMatch.index+fn.length; // index of '('
    // Find matching close paren
    let depth=1,closeIdx=-1;
    for(let i=openIdx+1;i<expr.length;i++){
      if(expr[i]==='(')depth++;
      else if(expr[i]===')'){depth--;if(depth===0){closeIdx=i;break;}}
    }
    if(closeIdx===-1)break;
    const rawArgs=expr.slice(openIdx+1,closeIdx);
    // Before calling fn, eval any pure arithmetic sub-expressions inside rawArgs
    // so that (1420-1200)/1200*100 becomes a number
    const result=callFn(fn,rawArgs,visited);
    expr=expr.slice(0,lastMatch.index)+String(result)+expr.slice(closeIdx+1);
  }

  // Now replace any remaining bare cell refs
  expr=expr.replace(/\b([A-Z]+\d+)\b/g,(m,id)=>{
    const v=getCellVal(id,visited);
    if(v===''||v===null||v===undefined)return '0';
    if(!isNaN(v)&&v!==true&&v!==false)return Number(v);
    return JSON.stringify(String(v));
  });

  try{
    const r=eval(expr);
    return r===undefined?'':r;
  }catch(e){
    return '#ERR!';
  }
}

function findComma(s){let d=0;for(let i=0;i<s.length;i++){if(s[i]==='(')d++;else if(s[i]===')')d--;else if(s[i]===','&&d===0)return i;}return-1;}

// ══════════════════════════════════════════
//  GRID BUILD
// ══════════════════════════════════════════
function buildGrid(){
  const tbl=document.getElementById('grid');
  let h='<thead><tr><th class="corner-head"></th>';
  for(let c=1;c<=COLS;c++)h+=`<th class="col-head" id="ch-${c}" onclick="selectCol(${c})">${colName(c)}</th>`;
  h+='</tr></thead><tbody>';
  for(let r=1;r<=ROWS;r++){
    h+=`<tr id="tr-${r}"><td class="row-head" onclick="selectRow(${r})">${r}</td>`;
    for(let c=1;c<=COLS;c++){
      const id=cellId(r,c);
      h+=`<td id="td-${id}" class="cell" onclick="clickCell('${id}',event)" ondblclick="dblCell('${id}')" oncontextmenu="showCtx('${id}',event)"><span class="cv" id="cv-${id}"></span></td>`;
    }
    h+='</tr>';
  }
  h+='</tbody>';
  tbl.innerHTML=h;
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function renderCell(id){
  const cv=document.getElementById('cv-'+id);if(!cv)return;
  const td=document.getElementById('td-'+id);if(!td)return;
  const raw=SD()[id]||'';
  const val=getCellVal(id);
  const st=SS()[id]||{};
  const isNum=val!==''&&!isNaN(val)&&val!==true&&val!==false;
  const isErr=String(val).includes('!');
  cv.className='cv'+(isNum?' num':'')+(isErr?' err':'');
  cv.textContent=isErr?val:isNum?numFmt(val):val;
  cv.title=raw;
  td.className='cell'+
    (st.bold?' has-bold':'')+
    (st.italic?' has-italic':'')+
    (st.align==='right'?' align-right':st.align==='center'?' align-center':'')+
    (st.color?' '+st.color:'');
}

function renderAll(){for(let r=1;r<=ROWS;r++)for(let c=1;c<=COLS;c++)renderCell(cellId(r,c));updateStatus();}

// ══════════════════════════════════════════
//  SELECTION
// ══════════════════════════════════════════
function clickCell(id,e){
  if(isEditing)commitEdit();
  if(e.shiftKey&&selStart){selEnd=id;selCell=id;highlightRange();updateFormulaBar();}
  else{clearHighlight();selStart=id;selEnd=null;selCell=id;document.getElementById('td-'+id)?.classList.add('selected');updateFormulaBar();}
  updateStatus();
}

function clearHighlight(){document.querySelectorAll('.cell.selected,.cell.in-range').forEach(el=>el.classList.remove('selected','in-range'));}

function highlightRange(){
  clearHighlight();if(!selStart)return;
  if(!selEnd){document.getElementById('td-'+selStart)?.classList.add('selected');return;}
  const a=parseRef(selStart),b=parseRef(selEnd);if(!a||!b)return;
  const r1=Math.min(a.row,b.row),r2=Math.max(a.row,b.row),c1=Math.min(a.col,b.col),c2=Math.max(a.col,b.col);
  for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++){
    const td=document.getElementById('td-'+cellId(r,c));
    if(td)td.classList.add(r===a.row&&c===a.col?'selected':'in-range');
  }
}

function selectCol(c){

  for(let r=1;r<=ROWS;r++){const td=document.getElementById('td-'+cellId(r,c));if(td)td.classList.add('in-range');}
  selStart=cellId(1,c);selEnd=cellId(ROWS,c);selCell=cellId(1,c);updateFormulaBar();updateStatus();
}

function selectRow(r){
  clearHighlight();

  selStart=cellId(r,1);selEnd=cellId(r,COLS);selCell=cellId(r,1);updateFormulaBar();updateStatus();

function updateFormulaBar(){
  document.getElementById('cell-ref-box').textContent=selCell||'';
  document.getElementById('formula-input').value=SD()[selCell]||'';
}

function updateStatus(){
  const cells=selEnd?expandRange(selStart,selEnd):[selStart].filter(Boolean);
  const nums=cells.map(id=>getCellVal(id)).filter(v=>v!==''&&!isNaN(v)&&v!==true&&v!==false).map(Number);
  const sum=nums.reduce((s,x)=>s+x,0);
  const avg=nums.length?sum/nums.length:0;
  document.getElementById('st-sum').textContent=nums.length?numFmt(sum):'—';
  document.getElementById('st-avg').textContent=nums.length?numFmt(avg):'—';
  document.getElementById('st-cnt').textContent=nums.length||'—';

// ══════════════════════════════════════════
function dblCell(id){
  if(isEditing)commitEdit();
  isEditing=true;selCell=id;
  const td=document.getElementById('td-'+id);if(!td)return;
  td.classList.add('editing');
  const cv=document.getElementById('cv-'+id);cv.style.display='none';
  const inp=document.createElement('input');
  inp.className='cell-input';inp.value=SD()[id]||'';
  inp.onblur=()=>{commitEdit();};
  inp.onkeydown=e=>{
    if(e.key==='Enter'){e.preventDefault();commitEdit();moveCell(1,0);}
    if(e.key==='Tab'){e.preventDefault();commitEdit();moveCell(0,e.shiftKey?-1:1);}
    if(e.key==='Escape'){cancelEdit(id,inp);}
  };
  inp.oninput=()=>{document.getElementById('formula-input').value=inp.value;};
  td.appendChild(inp);inp.focus();
  const v=inp.value;inp.value='';inp.value=v;
}

function commitEdit(){
  if(!isEditing)return;isEditing=false;
  const id=selCell;
  const td=document.getElementById('td-'+id);if(!td)return;
  const inp=td.querySelector('input.cell-input');
  if(inp){SD()[id]=inp.value;inp.remove();}
  const cv=document.getElementById('cv-'+id);if(cv)cv.style.display='';
  td.classList.remove('editing');
  renderAll();updateFormulaBar();
}

function cancelEdit(id,inp){
  isEditing=false;
  inp.remove();
  document.getElementById('td-'+id)?.classList.remove('editing');
  document.getElementById('cv-'+id).style.display='';
}

function moveCell(dr,dc){
  const ref=parseRef(selCell);if(!ref)return;
  const nr=Math.max(1,Math.min(ROWS,ref.row+dr));
  const nc=Math.max(1,Math.min(COLS,ref.col+dc));
  const nid=cellId(nr,nc);
  clearHighlight();selStart=nid;selEnd=null;selCell=nid;
  document.getElementById('td-'+nid)?.classList.add('selected');
  updateFormulaBar();
}

function onFormulaInput(){
  if(selCell){SD()[selCell]=document.getElementById('formula-input').value;renderCell(selCell);}
}
function onFormulaKey(e){if(e.key==='Enter'){renderAll();document.getElementById('formula-input').blur();}}

// ══════════════════════════════════════════
//  KEYBOARD NAV
// ══════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(isEditing)return;
  if(document.activeElement===document.getElementById('formula-input'))return;
  const ref=parseRef(selCell);if(!ref)return;
  const navKeys={'ArrowUp':[-1,0],'ArrowDown':[1,0],'ArrowLeft':[0,-1],'ArrowRight':[0,1],'Tab':[0,e.shiftKey?-1:1],'Enter':[1,0]};
  if(navKeys[e.key]){e.preventDefault();moveCell(...navKeys[e.key]);return;}
  if(e.key==='F2'){dblCell(selCell);return;}
  if(e.key==='Delete'||e.key==='Backspace'){
    if(e.key==='Delete'){delete SD()[selCell];renderCell(selCell);updateFormulaBar();}
    return;
  }
  if(e.key==='c'&&(e.ctrlKey||e.metaKey)){clipboard=SD()[selCell];toast('Copiado');return;}
  if(e.key==='v'&&(e.ctrlKey||e.metaKey)&&clipboard!==null){SD()[selCell]=clipboard;renderCell(selCell);return;}
  if(!e.ctrlKey&&!e.metaKey&&!e.altKey&&e.key.length===1){
    dblCell(selCell);
    const inp=document.getElementById('td-'+selCell)?.querySelector('input');
    if(inp){inp.value=e.key;document.getElementById('formula-input').value=e.key;}
  }
});

function shiftRows(fromRow,dir){
  const d=SD();const s=SS();const nd={};const ns={};
  Object.keys(d).forEach(id=>{
    const ref=parseRef(id);if(!ref)return;
    let r=ref.row;
    if(dir>0&&r>=fromRow)r+=dir;
    else if(dir<0&&r===fromRow){return;}
    else if(dir<0&&r>fromRow)r+=dir;
    nd[cellId(r,ref.col)]=d[id];
    if(s[id])ns[cellId(r,ref.col)]=s[id];
  });
  getSheet().data=nd;getSheet().styles=ns;
}
function shiftCols(fromCol,dir){
  const d=SD();const s=SS();const nd={};const ns={};
  Object.keys(d).forEach(id=>{
    const ref=parseRef(id);if(!ref)return;
    let c=ref.col;
    if(dir>0&&c>=fromCol)c+=dir;
    else if(dir<0&&c===fromCol){return;}
    else if(dir<0&&c>fromCol)c+=dir;
    nd[cellId(ref.row,c)]=d[id];
    if(s[id])ns[cellId(ref.row,c)]=s[id];
  });
  getSheet().data=nd;getSheet().styles=ns;
}

function openPivotPanel(){switchPanel('pivot');populatePivotCols();}
function populatePivotCols(){
  const headers=[];for(let c=1;c<=COLS;c++){const v=getCellVal(cellId(1,c));if(v)headers.push({label:v,c});}
  const sel1=document.getElementById('pivot-row-col');const sel2=document.getElementById('pivot-val-col');
  [sel1,sel2].forEach(s=>{s.innerHTML=headers.map(h=>`<option value="${h.c}">${h.label}</option>`).join('');});
  if(headers.length>1)sel2.selectedIndex=1;
}
function buildPivot(){
  const rc=parseInt(document.getElementById('pivot-row-col').value);
  const vc=parseInt(document.getElementById('pivot-val-col').value);
  const agg=document.getElementById('pivot-agg').value;
  const groups={};
  for(let r=2;r<=ROWS;r++){
    const key=String(getCellVal(cellId(r,rc)));
    if(!key)continue;
    const v=getCellVal(cellId(r,vc));const n=isNaN(v)?0:Number(v);
    if(!groups[key])groups[key]=[];
    groups[key].push(n);
  }
  const results=Object.entries(groups).map(([k,vs])=>{
    let v;
    if(agg==='SUM')v=vs.reduce((s,x)=>s+x,0);
    else if(agg==='AVERAGE')v=vs.reduce((s,x)=>s+x,0)/vs.length;
    else if(agg==='COUNT')v=vs.length;
    else if(agg==='MAX')v=Math.max(...vs);
    else if(agg==='MIN')v=Math.min(...vs);
    return{k,v};
  }).sort((a,b)=>b.v-a.v);
  const total=results.reduce((s,x)=>s+(agg==='COUNT'?x.v:x.v),0)||1;
  let html=`<div class="panel-title">${agg} por ${document.getElementById('pivot-row-col').options[document.getElementById('pivot-row-col').selectedIndex]?.text}</div>`;
  html+='<table class="pivot-table"><thead><tr><th>Valor</th><th>'+agg+'</th><th>%</th></tr></thead><tbody>';
  results.forEach(({k,v})=>{
    const pct=((v/total)*100).toFixed(1);
    html+=`<tr><td>${k}</td><td style="text-align:right">${numFmt(v)}</td><td><div>${pct}%</div><div class="pivot-bar" style="width:${pct}%"></div></td></tr>`;
  });
  html+=`<tr><td>TOTAL</td><td style="text-align:right">${numFmt(total)}</td><td></td></tr>`;
  html+='</tbody></table>';
  document.getElementById('pivot-result').innerHTML=html;
}

function importFile(e){
  const file=e.target.files[0];if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='csv'){
    const reader=new FileReader();
    reader.onload=ev=>{
      const lines=ev.target.result.split(/\r?\n/);
      lines.forEach((line,ri)=>{
        if(ri>=ROWS)return;
        const cols=parseCSVLine(line);
        cols.forEach((v,ci)=>{if(ci<COLS)SD()[cellId(ri+1,ci+1)]=v;});
      });
      renderAll();toast('CSV importado');
    };
    reader.readAsText(file);
  } else if(ext==='xlsx'||ext==='xls'){
    const reader=new FileReader();
    reader.onload=ev=>{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{header:1,raw:false});
      json.forEach((row,ri)=>{if(ri>=ROWS)return;row.forEach((v,ci)=>{if(ci<COLS)SD()[cellId(ri+1,ci+1)]=String(v||'');});});
      renderAll();toast('XLSX importado: '+wb.SheetNames[0]);
    };
    reader.readAsArrayBuffer(file);
  }
  e.target.value='';
}

function parseCSVLine(line){
  const result=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;}}
    else if(line[i]===','&&!inQ){result.push(cur.trim());cur='';}
    else cur+=line[i];
  }
  result.push(cur.trim());return result;
}

function exportCSV(){
  let csv='';
  for(let r=1;r<=ROWS;r++){
    const row=[];
    for(let c=1;c<=COLS;c++){const v=getCellVal(cellId(r,c));row.push(`"${String(v).replace(/"/g,'""')}"`);}
    csv+=row.join(',')+'\n';
  }
  dl('planilla.csv','data:text/csv;charset=utf-8,'+encodeURIComponent(csv));
  toast('CSV exportado');
}

function exportXLSX(){
  const wsData=[];
  for(let r=1;r<=ROWS;r++){
    const row=[];
    for(let c=1;c<=COLS;c++){const v=getCellVal(cellId(r,c));row.push(isNaN(v)||v===''?v:Number(v));}
    wsData.push(row);
  }
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,currentSheet);
  XLSX.writeFile(wb,'planilla.xlsx');
  toast('XLSX exportado');
}

  const rows=[['Laptop',1200,980,1350,1420],[' Monitor',450,520,480,510],[' Teclado',85,110,95,102],[' Mouse',45,60,55,58],[' Audífonos',120,140,160,175],[' Webcam',65,80,90,95],[' Hub USB',35,42,38,44]];
  rows.forEach((row,ri)=>{
    const r=ri+2;
    row.forEach((v,ci)=>{d[cellId(r,ci+1)]=v;});
    d[cellId(r,6)]=`=SUM(B${r}:E${r})`;
    d[cellId(r,7)]=`=ROUND((E${r}-B${r})/B${r}*100,1)`;
    SS()[cellId(r,7)]={color:'c-green'};
  });
  d[cellId(10,1)]='TOTAL';SS()[cellId(10,1)]={bold:true};
  for(let c=2;c<=6;c++)d[cellId(10,c)]=`=SUM(${colName(c)}2:${colName(c)}9)`;
  SS()[cellId(10,6)]={bold:true,color:'c-blue'};
  d['A12']='Promedio general:';SS()['A12']={italic:true};
  d['B12']='=AVERAGE(F2:F9)';
  d['A13']='Producto estrella:';SS()['A13']={italic:true};
  d['B13']=''; let _mx=-Infinity,_lbl=''; for(let _r=2;_r<=8;_r++){const _fv=Number(SD()[cellId(_r,6)]||0);if(_fv>_mx){_mx=_fv;_lbl=String(SD()[cellId(_r,1)]||'');}} d['B13']=_lbl;
}
